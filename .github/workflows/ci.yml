name: VeriLog AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Lint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Unit Tests (no Verilator, no GPU)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install a CPU-only torch to avoid 4GB GPU torch download in CI
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Generate synthetic base dataset (--no-sim)
        run: python -m data.generate_dataset --no-sim --all-modules

      - name: Run unit tests (exclude Verilator tests)
        run: |
          pytest tests/ -v --tb=short -m "not verilator" \
            --junitxml=reports/pytest_results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: reports/pytest_results.xml

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Dataset Pipeline Validation
  # ──────────────────────────────────────────────────────────────────────────
  dataset-pipeline:
    name: Dataset Pipeline
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (no torch needed for data pipeline)
        run: |
          pip install --upgrade pip
          pip install typer fastapi uvicorn pydantic httpx datasets pytest pyyaml

      - name: Generate base dataset (all modules, no-sim)
        run: python -m data.generate_dataset --no-sim --all-modules

      - name: Augment dataset
        run: python -m data.augment_dataset --n-aug 4  # Reduced for CI speed

      - name: Split dataset
        run: python -m data.split_dataset --train 0.70 --val 0.15

      - name: Validate split files exist and have correct structure
        run: |
          python -c "
          import json
          from pathlib import Path
          for split in ['train', 'val', 'test']:
              path = Path(f'data/splits/{split}.jsonl')
              assert path.exists(), f'Missing: {path}'
              rows = [json.loads(l) for l in path.read_text().splitlines() if l.strip()]
              assert len(rows) > 0, f'Empty split: {split}'
              for row in rows:
                  assert 'log' in row, f'Missing log field in {split}'
                  assert 'label' in row, f'Missing label field in {split}'
          print('All splits validated OK')
          "

      - name: Upload dataset artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dataset-splits
          path: data/splits/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Evaluation & Dashboard
  # ──────────────────────────────────────────────────────────────────────────
  evaluate:
    name: Evaluation Pipeline
    runs-on: ubuntu-latest
    needs: dataset-pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Generate dataset
        run: python -m data.generate_dataset --no-sim --all-modules

      - name: Run model evaluation (rule-based)
        run: |
          python -m model.eval --dataset data/dataset.jsonl \
            | tee reports/eval_report.json

      - name: Run natural bug evaluation
        run: |
          python -m model.natural_eval \
            --dataset data/natural_bugs.jsonl \
            --out reports/natural_bug_report.json

      - name: Run A/B test statistics
        run: |
          python -m metrics.ab_test \
            --input reports/ab_test_samples.json \
            --out reports/ab_test_report.json

      - name: Regenerate dashboard
        run: python -m metrics.dashboard

      - name: Print dashboard summary
        run: cat reports/dashboard_summary.md

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: reports/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Docker Build (on main only)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t verilog-ai:ci -f docker/Dockerfile .

      - name: Measure image size
        run: |
          SIZE=$(docker images verilog-ai:ci --format "{{.Size}}")
          echo "Docker image size: $SIZE"
          echo "IMAGE_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Smoke test — health endpoint
        run: |
          docker run -d --name verilog-ai-ci \
            -p 8000:8000 \
            -e MODEL_SERVER_ENABLED=0 \
            verilog-ai:ci
          sleep 8
          curl -f http://localhost:8000/health | tee /tmp/health.json
          cat /tmp/health.json | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"
          echo "Health check PASSED"

      - name: Smoke test — classify endpoint
        run: |
          curl -f -X POST http://localhost:8000/classify \
            -H "Content-Type: application/json" \
            -d '{"log": "ASSERT_FAIL: Counter overflow at cycle 23\nSimulation terminated..."}' \
            | tee /tmp/classify.json
          cat /tmp/classify.json | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'label' in d, 'Missing label'
          assert 'confidence' in d, 'Missing confidence'
          print(f'Classification: {d[\"label\"]} (confidence={d[\"confidence\"]})')
          "
          echo "Classify check PASSED"
          docker stop verilog-ai-ci

      - name: Push to GHCR (on main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin
          docker tag verilog-ai:ci ghcr.io/${{ github.repository }}:latest
          docker tag verilog-ai:ci ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
